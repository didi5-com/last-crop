<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - CropAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">
    <div class="text-center space-y-6 p-8 max-w-md">
        <div class="w-24 h-24 bg-red-500/10 rounded-full flex items-center justify-center mx-auto">
            <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
        </div>
        <h1 class="text-4xl font-extrabold">Oops!</h1>
        <p class="text-slate-400 text-lg">{{ error_message or "Something went wrong during the analysis." }}</p>
        <a href="/" class="inline-block bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-xl transition">
            Try Again
        </a>
    </div>
</body>
</html>
