<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CropAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <nav class="border-b border-slate-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center space-x-2">
                <i class="fas fa-leaf text-green-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-tighter">CropAI</span>
            </a>
            <div class="flex space-x-6">
                <a href="/" class="text-slate-400 hover:text-white transition">Home</a>
                <a href="/dashboard" class="text-white font-bold">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">System Analytics</h1>
        
        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-500 text-sm uppercase mb-1">Total Scans</p>
                <p class="text-3xl font-bold">1,284</p>
                <p class="text-green-500 text-xs mt-2">+12% from last week</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-500 text-sm uppercase mb-1">Accuracy Rate</p>
                <p class="text-3xl font-bold">96.4%</p>
                <p class="text-blue-500 text-xs mt-2">Based on expert validation</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-500 text-sm uppercase mb-1">Crops Supported</p>
                <p class="text-3xl font-bold">12</p>
                <p class="text-purple-500 text-xs mt-2">New: Mango, Banana</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-500 text-sm uppercase mb-1">Detections Today</p>
                <p class="text-3xl font-bold">42</p>
                <p class="text-yellow-500 text-xs mt-2">Active now</p>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700">
                <h3 class="text-lg font-bold mb-6">Common Diseases Detected</h3>
                <canvas id="diseaseChart"></canvas>
            </div>
            <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700">
                <h3 class="text-lg font-bold mb-6">Crop Distribution</h3>
                <canvas id="cropChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const diseaseCtx = document.getElementById('diseaseChart').getContext('2d');
        new Chart(diseaseCtx, {
            type: 'bar',
            data: {
                labels: ['Early Blight', 'Late Blight', 'Mosaic Virus', 'Rust', 'Leaf Spot'],
                datasets: [{
                    label: 'Detection Frequency',
                    data: [350, 280, 210, 180, 150],
                    backgroundColor: 'rgba(34, 197, 94, 0.5)',
                    borderColor: 'rgb(34, 197, 94)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        const cropCtx = document.getElementById('cropChart').getContext('2d');
        new Chart(cropCtx, {
            type: 'doughnut',
            data: {
                labels: ['Tomato', 'Cassava', 'Maize', 'Potato', 'Other'],
                datasets: [{
                    data: [40, 25, 15, 10, 10],
                    backgroundColor: [
                        '#ef4444', '#10b981', '#f59e0b', '#3b82f6', '#6366f1'
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#94a3b8' } }
                }
            }
        });
    </script>
</body>
</html>
